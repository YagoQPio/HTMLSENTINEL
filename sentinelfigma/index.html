<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sentinel - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo-container">
            <h4 class="mb-0" style="color: var(--accent-green)">SENTINEL</h4>
        </div>
        <nav>
            <a href="index.html" class="nav-link active"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
            <a href="novo-scan.html" class="nav-link"><i class="bi bi-search me-2"></i> Novo Scan</a>
            <a href="progresso.html" class="nav-link"><i class="bi bi-gear-wide-connected me-2"></i> Progresso</a>
            <a href="relatorio.html" class="nav-link"><i class="bi bi-file-earmark-bar-graph me-2"></i> Relatórios</a>
        </nav>
        <div class="user-footer text-center">Yago de Queiroz</div>
    </div>

    <div class="main-content">
        <h2 class="mb-4">Dashboard</h2>
        <div class="row">
            <div class="col-md-3">
                <div class="card-sentinel text-center">
                    <h6 class="text-muted">Scans Totais</h6>
                    <h2>142</h2>
                </div>
            </div>
            <div class="col-md-9">
                <div class="stat-critical d-flex justify-content-around align-items-center">
                    <div>
                        <h2 class="mb-0">8</h2>
                        <small>Vulnerabilidades Críticas</small>
                    </div>
                    <div class="vr"></div>
                    <p class="mb-0">Atenção necessária em 3 aplicações ativas.</p>
                </div>
            </div>
        </div>
        <div class="card-sentinel mt-4">
            <h5>Atividade Recente</h5>
            <table class="table align-middle">
                <thead><tr><th>Aplicação</th><th>Último Scan</th><th>Status</th><th>Ação</th></tr></thead>
                <tbody>
                    <tr>
                        <td>Sistema Financeiro</td>
                        <td>Há 2 horas</td>
                        <td><span class="badge bg-success">Seguro</span></td>
                        <td><a href="relatorio.html" class="btn btn-sm btn-outline-dark">Ver</a></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
