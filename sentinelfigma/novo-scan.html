<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sentinel - Novo Scan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo-container"><h4 style="color: var(--accent-green)">SENTINEL</h4></div>
        <nav>
            <a href="index.html" class="nav-link"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
            <a href="novo-scan.html" class="nav-link active"><i class="bi bi-search me-2"></i> Novo Scan</a>
            <a href="progresso.html" class="nav-link"><i class="bi bi-gear-wide-connected me-2"></i> Progresso</a>
            <a href="relatorio.html" class="nav-link"><i class="bi bi-file-earmark-bar-graph me-2"></i> Relatórios</a>
        </nav>
        <div class="user-footer text-center">Yago de Queiroz</div>
    </div>

    <div class="main-content">
        <h2 class="mb-4">Nova Auditoria</h2>
        <div class="card-sentinel col-lg-8">
            <form action="progresso.html">
                <div class="mb-3">
                    <label class="form-label fw-bold">Nome do Projeto</label>
                    <input type="text" class="form-control" placeholder="Ex: API de Pagamentos" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">URL de Destino</label>
                    <input type="url" class="form-control" placeholder="https://api.empresa.com" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold d-block">Módulos de Segurança</label>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox" checked> <label class="form-check-label">SAST</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox" checked> <label class="form-check-label">DAST</label>
                    </div>
                </div>
                <button type="submit" class="btn btn-sentinel w-100 py-3">INICIAR VARREDURA AGORA</button>
            </form>
        </div>
    </div>
</body>
</html>
